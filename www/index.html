<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon serveur HTTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <span class="topbar-title">Mon serveur HTTP</span>
    <span class="topbar-meta">
      <span id="clock">--:--:--</span>
      &nbsp;·&nbsp; HTTP/1.1 &nbsp;·&nbsp; C
    </span>
  </header>

  <section class="hero">
    <img src="banner.jpg" alt="Bannière" class="hero-bg">
    <div class="hero-overlay"></div>
    <div class="hero-card">
      <span class="status-dot"></span>
      <p class="status-label">Serveur en ligne</p>
      <p class="status-sub">Si tu vois cette page, ton serveur <strong>fonctionne</strong>.</p>
    </div>
  </section>

  <main>
    <section class="cgi-section">
      <h2 class="section-title">Exécution CGI</h2>
      <p class="section-desc">Lance une commande système directement depuis le navigateur.</p>

      <div class="cgi-controls">
        <div class="method-tabs">
          <button class="tab active" data-method="GET">GET</button>
          <button class="tab" data-method="POST">POST</button>
        </div>
        <div class="command-row">
          <select id="command-select">
            <option value="date">date</option>
            <option value="uptime">uptime</option>
            <option value="whoami">whoami</option>
          </select>
          <button id="run-btn" onclick="runCgi()">Exécuter</button>
        </div>
      </div>

      <div class="cgi-output" id="cgi-output">
        <span class="cgi-placeholder">La sortie s'affichera ici…</span>
      </div>
    </section>
  </main>

  <footer>
    <p>HTTP/1.1 — C — 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
