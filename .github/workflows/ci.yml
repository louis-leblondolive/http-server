name: CI
on: [push, pull_request]
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: make
      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r tester/requirements.txt
      - name: Start server
        run: cd $GITHUB_WORKSPACE && ./build/main & sleep 1
      - name: Run tests
        run: .venv/bin/python3 tester/test_runner.py

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: make
      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r tester/requirements.txt
      - name: Start server
        run: cd $GITHUB_WORKSPACE && ./build/main & sleep 1
      - name: Run tests
        run: .venv/bin/python3 tester/test_runner.py